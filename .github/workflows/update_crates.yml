name: Update Observatory Crates

on:
  schedule:
    - cron: '0 0 1 */3 *' # Runs at 00:00 on day-of-month 1 in every 3rd month (Jan, Apr, Jul, Oct)
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-crates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update_crates.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/project_crates.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update project_crates.json with new observatories"
            git push origin main
          fi
